# Career Pilot — Alert Config
# Copy to config/alert_config.yaml and fill in your credentials.
# This file is gitignored — credentials never leave your machine.

# ── Score threshold ────────────────────────────────────────────────────────────
# Jobs below this score are added to pipeline silently (no notification).
score_threshold: 75

# ── Channel 1: Gmail SMTP ─────────────────────────────────────────────────────
# Requires Gmail 2-Step Verification + an App Password.
# Generate at: https://myaccount.google.com/apppasswords
email: "you@gmail.com"
app_password: "xxxx xxxx xxxx xxxx"      # 16-char App Password (spaces OK)
# Use a + alias so Gmail doesn't suppress self-sent SMTP emails
recipient: "you+careerpilot@gmail.com"
smtp_host: "smtp.gmail.com"
smtp_port: 587

# ── Channel 2: iPhone push via ntfy.sh (FREE) ─────────────────────────────────
# 1. Install the 'ntfy' app on your iPhone/Android (App Store / Play Store)
# 2. Open ntfy → tap '+' → subscribe to the topic name you set below
# 3. Done — no account, no credit card, no rate limit for self-hosted use
ntfy_topic: "careerpilot-yourname-1234"   # Pick any unique string

# ── Channel 3: Telegram Bot (FREE) ────────────────────────────────────────────
# 1. Open Telegram → search for @BotFather → send /newbot → follow prompts
# 2. Copy the token BotFather gives you → paste below as telegram_token
# 3. Search for your new bot → click Start → send any message
# 4. Get your chat_id: open https://api.telegram.org/bot<TOKEN>/getUpdates
#    Look for "chat":{"id": <NUMBER>} → paste that number below
telegram_token: ""                        # e.g. 1234567890:AAHxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
telegram_chat_id: ""                      # e.g. 123456789

# ── Optional: self-hosted ntfy server ─────────────────────────────────────────
# ntfy_server: "https://ntfy.sh"          # default; override for self-hosted
