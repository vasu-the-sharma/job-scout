# Career Pilot — Alert Config
# Copy to config/alert_config.yaml and fill in.
# This file is gitignored — credentials never leave your machine.

# ── Score threshold ────────────────────────────────────────────────────────────
# Jobs below this score are added to pipeline silently (no notification).
score_threshold: 75

# ── Channel 1: Gmail SMTP ─────────────────────────────────────────────────────
# Requires Gmail 2-Step Verification + an App Password.
# Generate at: https://myaccount.google.com/apppasswords
email: "you@gmail.com"
app_password: "xxxx xxxx xxxx xxxx"   # 16-char App Password (spaces OK)
# Use a + alias so Gmail doesn't suppress self-sent SMTP emails
recipient: "you+careerpilot@gmail.com"
smtp_host: "smtp.gmail.com"
smtp_port: 587

# ── Channel 2: iPhone push via ntfy.sh (FREE) ─────────────────────────────────
# 1. Install the 'ntfy' app on your iPhone (App Store, free)
# 2. Open ntfy → tap '+' → subscribe to your topic name below
# 3. That's it — no account needed
ntfy_topic: "careerpilot-yourname"    # Choose any unique string

# ── Channel 3: WhatsApp via CallMeBot (FREE) ──────────────────────────────────
# One-time activation:
#   1. Add +34 644 61 39 60 to your WhatsApp contacts (name it "CallMeBot")
#   2. Send this exact message: I allow callmebot to send me messages
#   3. You'll receive an API key — paste it below
whatsapp_phone: "919876543210"        # Your number with country code, no +
whatsapp_apikey: ""                   # API key from CallMeBot activation message
