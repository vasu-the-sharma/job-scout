# Career Pilot — Email Alert Configuration
# ─────────────────────────────────────────
# Copy this file to config/alert_config.yaml and fill in your values.
# alert_config.yaml is gitignored — your credentials never leave this machine.

# ── Gmail Setup ───────────────────────────────────────────────────────────────
# Your Gmail address (used as both sender and default recipient)
email: "you@gmail.com"

# Gmail App Password — NOT your regular Gmail password.
# Generate one at: https://myaccount.google.com/apppasswords
# Click "Add app password" → name it "Career Pilot" → copy the 16-char code.
app_password: "xxxx xxxx xxxx xxxx"

# Where to send the alert (defaults to `email` above)
recipient: "you@gmail.com"

# ── SMTP Settings ─────────────────────────────────────────────────────────────
# Gmail defaults — only change if using a different email provider
smtp_host: "smtp.gmail.com"
smtp_port: 587

# ── Alert Threshold ───────────────────────────────────────────────────────────
# Jobs below this score are added to the pipeline silently — no notification.
# Recommended: 75 (balanced) or 80 (strong matches only)
score_threshold: 75
